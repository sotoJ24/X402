name: Frontend Preview

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/frontend/**'

jobs:
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run frontend:build
        env:
          VITE_API_URL: ${{ secrets.PREVIEW_API_URL }}

      - name: Comment build size on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process')
            const size = execSync('du -sh dist/frontend/ | cut -f1').toString().trim()
            const files = execSync('find dist/frontend -type f | wc -l').toString().trim()
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Frontend Build\n\n| | |\n|---|---|\n| **Size** | ${size} |\n| **Files** | ${files} |\n| **Status** | ✅ Build passed |`
            })
