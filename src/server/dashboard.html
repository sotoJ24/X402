<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metered — Live Transaction Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0a0f;
      --card:      #12121a;
      --border:    #1e1e2e;
      --border2:   #2a2a3e;
      --text:      #e0e0e0;
      --muted:     #6b6b8a;
      --green:     #22c55e;
      --green-dim: #166534;
      --amber:     #f59e0b;
      --amber-dim: #78350f;
      --usdc:      #4ade80;
      --blue:      #60a5fa;
      --purple:    #a78bfa;
      --red:       #f87171;
      --cyan:      #22d3ee;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Scanline overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.05) 2px,
        rgba(0,0,0,0.05) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(34,197,94,0.03) 0%, transparent 100%);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .logo span {
      color: var(--usdc);
    }

    .tagline {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .network-badge {
      font-size: 11px;
      padding: 4px 10px;
      border: 1px solid var(--amber-dim);
      background: rgba(245,158,11,0.08);
      color: var(--amber);
      border-radius: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .connection-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .dot.connected {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    .dot.disconnected { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1px;
      border-bottom: 1px solid var(--border);
      background: var(--border);
    }

    .stat {
      background: var(--card);
      padding: 18px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      color: var(--usdc);
      transition: color 0.3s;
    }

    .stat-value.calls { color: var(--blue); }
    .stat-value.service { color: var(--purple); font-size: 16px; }

    .stat-flash {
      animation: flash 0.4s ease;
    }

    @keyframes flash {
      0%   { opacity: 1; }
      30%  { opacity: 0.3; }
      100% { opacity: 1; }
    }

    /* ── Main layout ── */
    main {
      padding: 24px 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .tx-count {
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Transaction feed ── */
    #feed {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* ── Empty state ── */
    .empty-state {
      border: 1px dashed var(--border2);
      border-radius: 6px;
      padding: 60px 32px;
      text-align: center;
    }

    .empty-state .icon {
      font-size: 32px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    .empty-state code {
      color: var(--amber);
      font-size: 12px;
    }

    /* ── Transaction row ── */
    .tx-row {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: border-color 0.2s;
      animation: slideIn 0.25s ease;
    }

    .tx-row:hover { border-color: var(--border2); }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tx-row.new-flash {
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(34,197,94,0.15);
    }

    /* ── Service badge ── */
    .service-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .badge-search         { background: rgba(96,165,250,0.15); color: var(--blue);   border: 1px solid rgba(96,165,250,0.3); }
    .badge-finance        { background: rgba(167,139,250,0.15); color: var(--purple); border: 1px solid rgba(167,139,250,0.3); }
    .badge-inference      { background: rgba(245,158,11,0.15);  color: var(--amber);  border: 1px solid rgba(245,158,11,0.3); }
    .badge-session-search { background: rgba(34,211,238,0.15);  color: var(--cyan);   border: 1px solid rgba(34,211,238,0.3); }
    .badge-default        { background: rgba(224,224,224,0.1);  color: var(--text);   border: 1px solid var(--border); }

    /* ── Query text ── */
    .tx-query {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .tx-query .tx-hash {
      display: block;
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .tx-hash a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .tx-hash a:hover { color: var(--green); }

    /* ── Amount ── */
    .tx-amount {
      font-size: 14px;
      font-weight: 700;
      color: var(--usdc);
      white-space: nowrap;
      font-family: 'Syne', sans-serif;
    }

    /* ── Timestamp ── */
    .tx-time {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      text-align: right;
      min-width: 60px;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <div>
        <div class="logo">Metered<span>.</span></div>
        <div class="tagline">Live Transaction Feed</div>
      </div>
    </div>
    <div class="header-right">
      <div class="network-badge" id="network-badge">Stellar Testnet</div>
      <div class="connection-indicator">
        <div class="dot" id="dot"></div>
        <span id="conn-label">Connecting...</span>
      </div>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Total USDC</div>
      <div class="stat-value" id="stat-usdc">0.0000</div>
    </div>
    <div class="stat">
      <div class="stat-label">Total Calls</div>
      <div class="stat-value calls" id="stat-calls">0</div>
    </div>
    <div class="stat" id="stat-search-wrap">
      <div class="stat-label">Search</div>
      <div class="stat-value service" id="stat-search">0 calls</div>
    </div>
    <div class="stat" id="stat-finance-wrap">
      <div class="stat-label">Finance</div>
      <div class="stat-value service" id="stat-finance">0 calls</div>
    </div>
    <div class="stat" id="stat-inference-wrap">
      <div class="stat-label">Inference</div>
      <div class="stat-value service" id="stat-inference">0 calls</div>
    </div>
    <div class="stat" id="stat-session-wrap">
      <div class="stat-label">Session Search</div>
      <div class="stat-value service" id="stat-session">0 calls</div>
    </div>
  </div>

  <main>
    <div class="section-header">
      <div class="section-title">Transactions</div>
      <div class="tx-count" id="tx-count">—</div>
    </div>
    <div id="feed">
      <div class="empty-state" id="empty">
        <div class="icon">⬡</div>
        <p>Waiting for transactions...<br/>
        Run the agent to see payments flow.<br/><br/>
        <code>npm run agent</code></p>
      </div>
    </div>
  </main>

  <script>
    // ── Relative time ──────────────────────────────────────────────────────────
    function timeAgo(iso) {
      const diff = Math.floor((Date.now() - new Date(iso)) / 1000)
      if (diff < 5)  return 'just now'
      if (diff < 60) return `${diff}s ago`
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`
      return `${Math.floor(diff/3600)}h ago`
    }

    // ── Badge class by service ─────────────────────────────────────────────────
    function badgeClass(service) {
      const map = {
        'search': 'badge-search',
        'finance': 'badge-finance',
        'inference': 'badge-inference',
        'session-search': 'badge-session-search',
      }
      return map[service] ?? 'badge-default'
    }

    // ── Render a transaction row ───────────────────────────────────────────────
    function renderTx(tx) {
      const row = document.createElement('div')
      row.className = 'tx-row'
      row.dataset.id = tx.id

      const hashHtml = tx.txHash
        ? `<span class="tx-hash"><a href="https://stellar.expert/explorer/testnet/tx/${tx.txHash}" target="_blank" rel="noopener">${tx.txHash.slice(0,16)}…</a></span>`
        : ''

      row.innerHTML = `
        <span class="service-badge ${badgeClass(tx.service)}">${tx.service}</span>
        <div class="tx-query">
          ${tx.query}
          ${hashHtml}
        </div>
        <span class="tx-amount">+${tx.amount} USDC</span>
        <span class="tx-time" data-ts="${tx.timestamp}">${timeAgo(tx.timestamp)}</span>
      `
      return row
    }

    // ── Flash a new tx ─────────────────────────────────────────────────────────
    function flashRow(row) {
      row.classList.add('new-flash')
      setTimeout(() => row.classList.remove('new-flash'), 1200)
    }

    // ── Flash a stat value ─────────────────────────────────────────────────────
    function flashStat(el) {
      el.classList.remove('stat-flash')
      void el.offsetWidth
      el.classList.add('stat-flash')
    }

    // ── Update stats bar ──────────────────────────────────────────────────────
    function updateStats(stats) {
      const usdc = document.getElementById('stat-usdc')
      const calls = document.getElementById('stat-calls')
      usdc.textContent = stats.totalUsdc
      calls.textContent = stats.totalCalls
      flashStat(usdc)
      flashStat(calls)

      const svc = stats.services || {}
      const map = {
        'search': 'stat-search',
        'finance': 'stat-finance',
        'inference': 'stat-inference',
        'session-search': 'stat-session',
      }
      for (const [key, elId] of Object.entries(map)) {
        const el = document.getElementById(elId)
        if (svc[key]) {
          el.textContent = `${svc[key].calls} calls / ${svc[key].usdc.toFixed(4)} USDC`
          flashStat(el)
        } else {
          el.textContent = '0 calls'
        }
      }

      document.getElementById('tx-count').textContent = `${stats.totalCalls} transaction${stats.totalCalls !== 1 ? 's' : ''}`
    }

    // ── Prepend tx to feed ────────────────────────────────────────────────────
    function prependTx(tx) {
      const feed = document.getElementById('feed')
      const empty = document.getElementById('empty')
      if (empty) empty.remove()
      const row = renderTx(tx)
      feed.insertBefore(row, feed.firstChild)
      flashRow(row)
      // Keep max 100 rows in DOM
      const rows = feed.querySelectorAll('.tx-row')
      if (rows.length > 100) rows[rows.length - 1].remove()
    }

    // ── Populate initial transactions ─────────────────────────────────────────
    function populateInit(transactions) {
      const feed = document.getElementById('feed')
      if (!transactions.length) return
      document.getElementById('empty')?.remove()
      for (const tx of transactions) {
        feed.appendChild(renderTx(tx))
      }
    }

    // ── Update relative timestamps every 10s ──────────────────────────────────
    setInterval(() => {
      document.querySelectorAll('.tx-time[data-ts]').forEach(el => {
        el.textContent = timeAgo(el.dataset.ts)
      })
    }, 10000)

    // ── SSE connection ─────────────────────────────────────────────────────────
    const dot = document.getElementById('dot')
    const label = document.getElementById('conn-label')

    function connect() {
      const es = new EventSource('/dashboard/events')

      es.onopen = () => {
        dot.className = 'dot connected'
        label.textContent = 'Connected'
      }

      es.onmessage = (e) => {
        const msg = JSON.parse(e.data)
        if (msg.type === 'init') {
          populateInit(msg.transactions)
          updateStats(msg.stats)
        } else if (msg.type === 'tx') {
          prependTx(msg.transaction)
          updateStats(msg.stats)
        }
        // ping — do nothing
      }

      es.onerror = () => {
        dot.className = 'dot disconnected'
        label.textContent = 'Reconnecting...'
        es.close()
        setTimeout(connect, 3000)
      }
    }

    connect()
  </script>
</body>
</html>
